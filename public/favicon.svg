<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#0057FF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#0046D5"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#003FCC"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#003099"/>
    </linearGradient>
  </defs>

  <!-- Base line -->
  <line x1="4" y1="66" x2="68" y2="66" stroke="#0057FF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bar 1 — shortest -->
  <rect x="5"  y="50" width="12" height="16" rx="2.5" fill="url(#bar1)"/>
  <!-- Bar 2 -->
  <rect x="21" y="38" width="12" height="28" rx="2.5" fill="url(#bar2)"/>
  <!-- Bar 3 -->
  <rect x="37" y="24" width="12" height="42" rx="2.5" fill="url(#bar3)"/>
  <!-- Bar 4 — tallest -->
  <rect x="53" y="10" width="12" height="56" rx="2.5" fill="url(#bar4)"/>

  <!-- Upward arrow on top of tallest bar -->
  <polygon points="59,3 52,13 66,13" fill="#0057FF"/>
</svg>
